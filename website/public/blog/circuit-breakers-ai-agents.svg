<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur8">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <pattern id="dots8" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots8)"/>
  <rect width="1200" height="630" fill="url(#glow8)"/>

  <!-- Circuit board traces (background pattern) -->
  <g opacity="0.15">
    <!-- Horizontal traces -->
    <line x1="0" y1="200" x2="400" y2="200" stroke="#7C3AED" stroke-width="2"/>
    <line x1="0" y1="315" x2="350" y2="315" stroke="#7C3AED" stroke-width="2"/>
    <line x1="0" y1="430" x2="400" y2="430" stroke="#7C3AED" stroke-width="2"/>
    <line x1="800" y1="200" x2="1200" y2="200" stroke="#7C3AED" stroke-width="2"/>
    <line x1="850" y1="315" x2="1200" y2="315" stroke="#7C3AED" stroke-width="2"/>
    <line x1="800" y1="430" x2="1200" y2="430" stroke="#7C3AED" stroke-width="2"/>

    <!-- Vertical connecting traces -->
    <line x1="400" y1="200" x2="400" y2="250" stroke="#7C3AED" stroke-width="2"/>
    <line x1="400" y1="250" x2="450" y2="250" stroke="#7C3AED" stroke-width="2"/>
    <line x1="350" y1="315" x2="450" y2="315" stroke="#7C3AED" stroke-width="2"/>
    <line x1="400" y1="380" x2="400" y2="430" stroke="#7C3AED" stroke-width="2"/>
    <line x1="400" y1="380" x2="450" y2="380" stroke="#7C3AED" stroke-width="2"/>

    <line x1="750" y1="250" x2="800" y2="250" stroke="#7C3AED" stroke-width="2"/>
    <line x1="800" y1="200" x2="800" y2="250" stroke="#7C3AED" stroke-width="2"/>
    <line x1="750" y1="315" x2="850" y2="315" stroke="#7C3AED" stroke-width="2"/>
    <line x1="750" y1="380" x2="800" y2="380" stroke="#7C3AED" stroke-width="2"/>
    <line x1="800" y1="380" x2="800" y2="430" stroke="#7C3AED" stroke-width="2"/>

    <!-- Junction dots -->
    <circle cx="400" cy="200" r="4" fill="#7C3AED"/>
    <circle cx="400" cy="430" r="4" fill="#7C3AED"/>
    <circle cx="800" cy="200" r="4" fill="#7C3AED"/>
    <circle cx="800" cy="430" r="4" fill="#7C3AED"/>
  </g>

  <!-- Three circuit breaker states -->

  <!-- State 1: CLOSED (left) — circuit complete -->
  <g transform="translate(450, 160)">
    <rect width="100" height="80" rx="8" fill="#111113" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
    <!-- Switch in closed position -->
    <line x1="20" y1="40" x2="80" y2="40" stroke="#22C55E" stroke-width="3" opacity="0.6"/>
    <circle cx="20" cy="40" r="5" fill="#22C55E" opacity="0.5"/>
    <circle cx="80" cy="40" r="5" fill="#22C55E" opacity="0.5"/>
    <!-- Label -->
    <rect x="15" y="60" width="70" height="12" rx="3" fill="#22C55E" opacity="0.15"/>
  </g>
  <!-- CLOSED label -->
  <text x="500" y="260" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="11" opacity="0.5">CLOSED</text>

  <!-- State 2: OPEN (center) — circuit broken, THE GAP -->
  <g transform="translate(530, 280)">
    <rect width="140" height="100" rx="10" fill="#111113" stroke="#EF4444" stroke-width="2" opacity="0.7"/>
    <circle cx="70" cy="50" r="35" fill="#EF4444" opacity="0.04" filter="url(#blur8)"/>
    <!-- Switch in open position — GAP -->
    <line x1="25" y1="50" x2="50" y2="50" stroke="#EF4444" stroke-width="3" opacity="0.7"/>
    <line x1="50" y1="50" x2="70" y2="30" stroke="#EF4444" stroke-width="3" opacity="0.7"/>
    <circle cx="25" cy="50" r="5" fill="#EF4444" opacity="0.5"/>
    <circle cx="90" cy="50" r="5" fill="#EF4444" opacity="0.3"/>
    <line x1="90" y1="50" x2="115" y2="50" stroke="#EF4444" stroke-width="3" opacity="0.3" stroke-dasharray="3,3"/>
    <!-- Spark/break indicator -->
    <line x1="72" y1="32" x2="78" y2="42" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
    <line x1="78" y1="32" x2="72" y2="42" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
    <!-- Label -->
    <rect x="30" y="74" width="80" height="14" rx="4" fill="#EF4444" opacity="0.15"/>
  </g>
  <!-- OPEN label -->
  <text x="600" y="400" text-anchor="middle" fill="#EF4444" font-family="monospace" font-size="13" font-weight="bold" opacity="0.6">OPEN</text>

  <!-- State 3: HALF-OPEN (right) — testing -->
  <g transform="translate(650, 160)">
    <rect width="100" height="80" rx="8" fill="#111113" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
    <!-- Switch half-way -->
    <line x1="20" y1="40" x2="50" y2="40" stroke="#F59E0B" stroke-width="3" opacity="0.6"/>
    <line x1="50" y1="40" x2="65" y2="32" stroke="#F59E0B" stroke-width="3" opacity="0.6"/>
    <circle cx="20" cy="40" r="5" fill="#F59E0B" opacity="0.5"/>
    <circle cx="80" cy="40" r="5" fill="#F59E0B" opacity="0.3"/>
    <!-- Dashed test connection -->
    <line x1="65" y1="32" x2="80" y2="40" stroke="#F59E0B" stroke-width="2" stroke-dasharray="3,2" opacity="0.4"/>
    <!-- Label -->
    <rect x="10" y="60" width="80" height="12" rx="3" fill="#F59E0B" opacity="0.15"/>
  </g>
  <!-- HALF-OPEN label -->
  <text x="700" y="260" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="11" opacity="0.5">HALF-OPEN</text>

  <!-- Transition arrows between states -->
  <path d="M555,240 Q580,265 570,280" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.4" marker-end="none"/>
  <polygon points="568,275 574,280 566,282" fill="#7C3AED" opacity="0.4"/>

  <path d="M665,380 Q690,370 700,350 Q710,330 700,280 Q695,260 695,245" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.4"/>
  <polygon points="693,248 697,240 701,248" fill="#7C3AED" opacity="0.4"/>

  <path d="M655,200 Q630,195 560,195 Q555,195 555,170" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.4"/>
  <polygon points="553,173 557,165 561,173" fill="#7C3AED" opacity="0.4"/>

  <!-- Failure count indicator -->
  <g transform="translate(555, 420)">
    <rect width="90" height="28" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <text x="45" y="19" text-anchor="middle" fill="#EF4444" font-family="monospace" font-size="10" opacity="0.6">3/3 fails</text>
  </g>
</svg>