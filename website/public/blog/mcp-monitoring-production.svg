<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <pattern id="dots3" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots3)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Dashboard frame -->
  <rect x="200" y="100" width="800" height="430" rx="12" fill="#111113" stroke="#27272A" stroke-width="1.5"/>

  <!-- Top bar of dashboard -->
  <rect x="200" y="100" width="800" height="44" rx="12" fill="#111113" stroke="#27272A" stroke-width="1"/>
  <rect x="200" y="132" width="800" height="12" fill="#111113"/>
  <circle cx="228" cy="122" r="5" fill="#EF4444" opacity="0.6"/>
  <circle cx="248" cy="122" r="5" fill="#F59E0B" opacity="0.6"/>
  <circle cx="268" cy="122" r="5" fill="#22C55E" opacity="0.6"/>

  <!-- Heartbeat / pulse line -->
  <polyline points="240,320 320,320 350,320 370,280 390,360 410,250 430,380 450,300 470,320 550,320 570,280 590,360 610,250 630,380 650,300 670,320 750,320 770,280 790,360 810,260 830,370 850,310 870,320 960,320"
    fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Glow on pulse -->
  <polyline points="240,320 320,320 350,320 370,280 390,360 410,250 430,380 450,300 470,320 550,320 570,280 590,360 610,250 630,380 650,300 670,320 750,320 770,280 790,360 810,260 830,370 850,310 870,320 960,320"
    fill="none" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.08" filter="url(#blur3)"/>

  <!-- Server status indicators (top row) -->
  <g transform="translate(250, 170)">
    <rect width="160" height="70" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="20" cy="20" r="4" fill="#22C55E" opacity="0.8"/>
    <rect x="32" y="16" width="60" height="8" rx="2" fill="#27272A"/>
    <rect x="16" y="42" width="80" height="10" rx="2" fill="#22C55E" opacity="0.15"/>
    <rect x="16" y="42" width="65" height="10" rx="2" fill="#22C55E" opacity="0.3"/>
  </g>

  <g transform="translate(440, 170)">
    <rect width="160" height="70" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="20" cy="20" r="4" fill="#22C55E" opacity="0.8"/>
    <rect x="32" y="16" width="70" height="8" rx="2" fill="#27272A"/>
    <rect x="16" y="42" width="80" height="10" rx="2" fill="#22C55E" opacity="0.15"/>
    <rect x="16" y="42" width="72" height="10" rx="2" fill="#22C55E" opacity="0.3"/>
  </g>

  <g transform="translate(630, 170)">
    <rect width="160" height="70" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="20" cy="20" r="4" fill="#F59E0B" opacity="0.8"/>
    <rect x="32" y="16" width="55" height="8" rx="2" fill="#27272A"/>
    <rect x="16" y="42" width="80" height="10" rx="2" fill="#F59E0B" opacity="0.15"/>
    <rect x="16" y="42" width="45" height="10" rx="2" fill="#F59E0B" opacity="0.3"/>
  </g>

  <g transform="translate(820, 170)">
    <rect width="160" height="70" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="20" cy="20" r="4" fill="#EF4444" opacity="0.8"/>
    <rect x="32" y="16" width="50" height="8" rx="2" fill="#27272A"/>
    <rect x="16" y="42" width="80" height="10" rx="2" fill="#EF4444" opacity="0.15"/>
    <rect x="16" y="42" width="20" height="10" rx="2" fill="#EF4444" opacity="0.3"/>
  </g>

  <!-- Bottom status table rows -->
  <line x1="240" y1="400" x2="960" y2="400" stroke="#27272A" stroke-width="0.5"/>
  <line x1="240" y1="430" x2="960" y2="430" stroke="#27272A" stroke-width="0.5"/>
  <line x1="240" y1="460" x2="960" y2="460" stroke="#27272A" stroke-width="0.5"/>
  <line x1="240" y1="490" x2="960" y2="490" stroke="#27272A" stroke-width="0.5"/>

  <!-- Row dots -->
  <circle cx="260" cy="415" r="3" fill="#22C55E" opacity="0.7"/>
  <rect x="276" y="411" width="80" height="8" rx="2" fill="#27272A" opacity="0.6"/>
  <rect x="500" y="411" width="50" height="8" rx="2" fill="#27272A" opacity="0.4"/>

  <circle cx="260" cy="445" r="3" fill="#22C55E" opacity="0.7"/>
  <rect x="276" y="441" width="70" height="8" rx="2" fill="#27272A" opacity="0.6"/>
  <rect x="500" y="441" width="60" height="8" rx="2" fill="#27272A" opacity="0.4"/>

  <circle cx="260" cy="475" r="3" fill="#F59E0B" opacity="0.7"/>
  <rect x="276" y="471" width="90" height="8" rx="2" fill="#27272A" opacity="0.6"/>
  <rect x="500" y="471" width="40" height="8" rx="2" fill="#27272A" opacity="0.4"/>

  <circle cx="260" cy="505" r="3" fill="#EF4444" opacity="0.7"/>
  <rect x="276" y="501" width="65" height="8" rx="2" fill="#27272A" opacity="0.6"/>
  <rect x="500" y="501" width="55" height="8" rx="2" fill="#27272A" opacity="0.4"/>
