<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur6">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <pattern id="dots6" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots6)"/>
  <rect width="1200" height="630" fill="url(#glow6)"/>

  <!-- Bar chart visualization -->
  <g transform="translate(200, 100)">
    <!-- Chart frame -->
    <rect width="500" height="400" rx="10" fill="#111113" stroke="#27272A" stroke-width="1.5"/>

    <!-- Y-axis labels -->
    <rect x="20" y="50" width="30" height="7" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="20" y="120" width="25" height="7" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="20" y="190" width="28" height="7" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="20" y="260" width="22" height="7" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="20" y="330" width="18" height="7" rx="2" fill="#27272A" opacity="0.5"/>

    <!-- Grid lines -->
    <line x1="65" y1="53" x2="480" y2="53" stroke="#27272A" stroke-width="0.5" stroke-dasharray="3,6"/>
    <line x1="65" y1="123" x2="480" y2="123" stroke="#27272A" stroke-width="0.5" stroke-dasharray="3,6"/>
    <line x1="65" y1="193" x2="480" y2="193" stroke="#27272A" stroke-width="0.5" stroke-dasharray="3,6"/>
    <line x1="65" y1="263" x2="480" y2="263" stroke="#27272A" stroke-width="0.5" stroke-dasharray="3,6"/>
    <line x1="65" y1="333" x2="480" y2="333" stroke="#27272A" stroke-width="0.5" stroke-dasharray="3,6"/>

    <!-- Baseline -->
    <line x1="65" y1="365" x2="480" y2="365" stroke="#27272A" stroke-width="1"/>

    <!-- Bars (cost per tool) -->
    <rect x="90" y="80" width="50" height="285" rx="3" fill="#22C55E" opacity="0.35"/>
    <rect x="90" y="80" width="50" height="285" rx="3" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.5"/>

    <rect x="165" y="150" width="50" height="215" rx="3" fill="#22C55E" opacity="0.3"/>
    <rect x="165" y="150" width="50" height="215" rx="3" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.4"/>

    <rect x="240" y="220" width="50" height="145" rx="3" fill="#34D399" opacity="0.25"/>
    <rect x="240" y="220" width="50" height="145" rx="3" fill="none" stroke="#34D399" stroke-width="1" opacity="0.4"/>

    <rect x="315" y="280" width="50" height="85" rx="3" fill="#34D399" opacity="0.2"/>
    <rect x="315" y="280" width="50" height="85" rx="3" fill="none" stroke="#34D399" stroke-width="1" opacity="0.35"/>

    <rect x="390" y="310" width="50" height="55" rx="3" fill="#059669" opacity="0.2"/>
    <rect x="390" y="310" width="50" height="55" rx="3" fill="none" stroke="#059669" stroke-width="1" opacity="0.3"/>

    <!-- X-axis labels -->
    <rect x="90" y="375" width="50" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="165" y="375" width="50" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="240" y="375" width="50" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="315" y="375" width="50" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="390" y="375" width="50" height="6" rx="2" fill="#27272A" opacity="0.4"/>
  </g>

  <!-- Pie chart (right side) -->
  <g transform="translate(850, 300)">
    <circle cx="0" cy="0" r="130" fill="#111113" stroke="#27272A" stroke-width="1.5"/>
    <!-- Segments via stroke-dasharray on circles -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#22C55E" stroke-width="30" stroke-dasharray="220 408" transform="rotate(-90)" opacity="0.5"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#34D399" stroke-width="30" stroke-dasharray="130 498" transform="rotate(36)" opacity="0.4"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#059669" stroke-width="30" stroke-dasharray="80 548" transform="rotate(150)" opacity="0.35"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#047857" stroke-width="30" stroke-dasharray="60 568" transform="rotate(220)" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#065F46" stroke-width="30" stroke-dasharray="40 588" transform="rotate(290)" opacity="0.25"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="55" fill="#111113"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#27272A" stroke-width="0.5"/>
  </g>

  <!-- Dollar sign abstraction (center-right connection) -->
  <g transform="translate(740, 140)" opacity="0.5">
    <circle cx="0" cy="0" r="24" fill="#111113" stroke="#22C55E" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="20" opacity="0.7">$</text>
  </g>

  <!-- Cost lines connecting chart to pie -->
  <line x1="700" y1="300" x2="720" y2="300" stroke="#22C55E" stroke-width="1" stroke-dasharray="3,4" opacity="0.2"/>

  <!-- Floating cost badges -->
  <rect x="770" y="480" width="80" height="26" rx="6" fill="#111113" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="880" y="480" width="70" height="26" rx="6" fill="#111113" stroke="#34D399" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="970" y="480" width="60" height="26" rx="6" fill="#111113" stroke="#059669" stroke-width="0.5" stroke-opacity="0.3"/>
</svg>