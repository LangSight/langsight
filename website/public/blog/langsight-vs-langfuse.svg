<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow9a" cx="35%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow9b" cx="65%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#71717A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots9" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots9)"/>
  <rect width="1200" height="630" fill="url(#glow9a)"/>
  <rect width="1200" height="630" fill="url(#glow9b)"/>

  <!-- Center dividing line -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#27272A" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- LangSight side (left) — Indigo -->
  <!-- Hexagonal / shield shape -->
  <path d="M350,180 L480,120 L480,340 Q480,420 350,480 Q220,420 220,340 L220,120 Z" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M350,210 L450,160 L450,320 Q450,385 350,435 Q250,385 250,320 L250,160 Z" fill="#6366F1" opacity="0.03"/>

  <!-- LangSight monitoring symbols -->
  <!-- Heartbeat -->
  <polyline points="270,280 300,280 315,260 330,310 345,250 360,290 375,280 430,280" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Shield mini icon -->
  <path d="M340,340 L370,330 L370,370 Q370,385 340,395 Q310,385 310,370 L310,330 Z" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="340" cy="360" r="4" fill="#6366F1" opacity="0.4"/>

  <!-- Network nodes -->
  <circle cx="290" cy="220" r="4" fill="#6366F1" opacity="0.4"/>
  <circle cx="410" cy="220" r="4" fill="#6366F1" opacity="0.4"/>
  <circle cx="350" cy="190" r="4" fill="#6366F1" opacity="0.5"/>
  <line x1="290" y1="220" x2="350" y2="190" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
  <line x1="410" y1="220" x2="350" y2="190" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
  <line x1="290" y1="220" x2="410" y2="220" stroke="#6366F1" stroke-width="1" opacity="0.2"/>

  <!-- Langfuse side (right) — Warm gray -->
  <!-- Brain / neural shape -->
  <circle cx="850" cy="300" r="130" fill="none" stroke="#71717A" stroke-width="2" opacity="0.2"/>
  <circle cx="850" cy="300" r="90" fill="none" stroke="#71717A" stroke-width="1" opacity="0.15"/>

  <!-- Internal neural network pattern -->
  <circle cx="810" cy="260" r="5" fill="#71717A" opacity="0.4"/>
  <circle cx="870" cy="240" r="5" fill="#71717A" opacity="0.35"/>
  <circle cx="900" cy="280" r="5" fill="#71717A" opacity="0.4"/>
  <circle cx="880" cy="330" r="5" fill="#71717A" opacity="0.35"/>
  <circle cx="830" cy="350" r="5" fill="#71717A" opacity="0.4"/>
  <circle cx="800" cy="310" r="5" fill="#71717A" opacity="0.3"/>
  <circle cx="860" cy="290" r="5" fill="#71717A" opacity="0.35"/>

  <!-- Neural connections -->
  <line x1="810" y1="260" x2="870" y2="240" stroke="#71717A" stroke-width="1" opacity="0.2"/>
  <line x1="870" y1="240" x2="900" y2="280" stroke="#71717A" stroke-width="1" opacity="0.2"/>
  <line x1="900" y1="280" x2="880" y2="330" stroke="#71717A" stroke-width="1" opacity="0.2"/>
  <line x1="880" y1="330" x2="830" y2="350" stroke="#71717A" stroke-width="1" opacity="0.2"/>
  <line x1="830" y1="350" x2="800" y2="310" stroke="#71717A" stroke-width="1" opacity="0.2"/>
  <line x1="800" y1="310" x2="810" y2="260" stroke="#71717A" stroke-width="1" opacity="0.2"/>
  <line x1="860" y1="290" x2="810" y2="260" stroke="#71717A" stroke-width="1" opacity="0.15"/>
  <line x1="860" y1="290" x2="900" y2="280" stroke="#71717A" stroke-width="1" opacity="0.15"/>
  <line x1="860" y1="290" x2="830" y2="350" stroke="#71717A" stroke-width="1" opacity="0.15"/>
  <line x1="860" y1="290" x2="870" y2="240" stroke="#71717A" stroke-width="1" opacity="0.15"/>

  <!-- Trace/eval symbols on Langfuse side -->
  <rect x="780" y="420" width="140" height="20" rx="4" fill="#111113" stroke="#71717A" stroke-width="0.5" opacity="0.4"/>
  <rect x="790" y="425" width="40" height="10" rx="2" fill="#71717A" opacity="0.15"/>
  <rect x="840" y="425" width="30" height="10" rx="2" fill="#71717A" opacity="0.1"/>
  <rect x="880" y="425" width="25" height="10" rx="2" fill="#71717A" opacity="0.1"/>

  <!-- Puzzle piece connection in the middle -->
  <g transform="translate(565, 270)">
    <!-- Left piece (indigo) -->
    <path d="M0,0 L25,0 L25,15 Q35,20 35,30 Q35,40 25,45 L25,60 L0,60 Z" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Right piece (gray) -->
    <path d="M70,0 L45,0 L45,15 Q35,20 35,30 Q35,40 45,45 L45,60 L70,60 Z" fill="#71717A" opacity="0.12" stroke="#71717A" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Plus sign between them -->
  <text x="600" y="250" text-anchor="middle" fill="#27272A" font-family="monospace" font-size="24" opacity="0.4">+</text>

  <!-- Small feature tags below -->
  <g transform="translate(240, 510)">
    <rect width="80" height="20" rx="4" fill="#6366F1" opacity="0.1" stroke="#6366F1" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="90" y="0" width="65" height="20" rx="4" fill="#6366F1" opacity="0.1" stroke="#6366F1" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="165" y="0" width="55" height="20" rx="4" fill="#6366F1" opacity="0.1" stroke="#6366F1" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>
  <g transform="translate(760, 510)">
    <rect width="70" height="20" rx="4" fill="#71717A" opacity="0.08" stroke="#71717A" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="80" y="0" width="60" height="20" rx="4" fill="#71717A" opacity="0.08" stroke="#71717A" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="150" y="0" width="75" height="20" rx="4" fill="#71717A" opacity="0.08" stroke="#71717A" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>
</svg>