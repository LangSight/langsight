<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur7">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <pattern id="dots7" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots7)"/>
  <rect width="1200" height="630" fill="url(#glow7)"/>

  <!-- Schema A (left, aligned) -->
  <g transform="translate(200, 120)">
    <rect width="300" height="380" rx="10" fill="#111113" stroke="#27272A" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="300" height="40" rx="10" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <rect x="0" y="28" width="300" height="12" fill="#111113"/>
    <circle cx="20" cy="20" r="4" fill="#22C55E" opacity="0.6"/>
    <rect x="32" y="15" width="70" height="10" rx="2" fill="#22C55E" opacity="0.2"/>

    <!-- Schema rows -->
    <rect x="20" y="60" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="70" width="60" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="70" width="40" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="104" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="114" width="80" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="114" width="50" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="148" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="158" width="55" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="158" width="35" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="192" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="202" width="70" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="202" width="45" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="236" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="246" width="65" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="246" width="55" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="280" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="290" width="75" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="290" width="40" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="324" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="334" width="50" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="334" width="48" height="8" rx="2" fill="#22C55E" opacity="0.3"/>
  </g>

  <!-- Schema B (right, shifted/drifted) — slightly offset vertically to show drift -->
  <g transform="translate(700, 130)">
    <rect width="300" height="380" rx="10" fill="#111113" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
    <!-- Header -->
    <rect width="300" height="40" rx="10" fill="#111113" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <rect x="0" y="28" width="300" height="12" fill="#111113"/>
    <circle cx="20" cy="20" r="4" fill="#F59E0B" opacity="0.6"/>
    <rect x="32" y="15" width="70" height="10" rx="2" fill="#F59E0B" opacity="0.2"/>

    <!-- Schema rows — some match, some differ (drift) -->
    <rect x="20" y="60" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="70" width="60" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="70" width="40" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <!-- DRIFTED row — highlighted -->
    <rect x="20" y="104" width="260" height="32" rx="4" fill="#F59E0B" opacity="0.08"/>
    <rect x="20" y="104" width="260" height="32" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
    <rect x="30" y="114" width="90" height="8" rx="2" fill="#F59E0B" opacity="0.5"/>
    <rect x="180" y="114" width="50" height="8" rx="2" fill="#F59E0B" opacity="0.4"/>

    <rect x="20" y="148" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="158" width="55" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="158" width="35" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <!-- REMOVED row — crossed out -->
    <rect x="20" y="192" width="260" height="32" rx="4" fill="#EF4444" opacity="0.06"/>
    <rect x="20" y="192" width="260" height="32" rx="4" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.2"/>
    <line x1="30" y1="208" x2="270" y2="208" stroke="#EF4444" stroke-width="1" opacity="0.4"/>

    <!-- ADDED row — new -->
    <rect x="20" y="236" width="260" height="32" rx="4" fill="#3B82F6" opacity="0.06"/>
    <rect x="20" y="236" width="260" height="32" rx="4" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
    <rect x="30" y="246" width="75" height="8" rx="2" fill="#3B82F6" opacity="0.4"/>
    <rect x="180" y="246" width="45" height="8" rx="2" fill="#3B82F6" opacity="0.3"/>
    <text x="260" y="250" fill="#3B82F6" font-family="monospace" font-size="8" opacity="0.6">+new</text>

    <rect x="20" y="280" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="290" width="65" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="290" width="55" height="8" rx="2" fill="#22C55E" opacity="0.3"/>

    <rect x="20" y="324" width="260" height="32" rx="4" fill="#27272A" opacity="0.15"/>
    <rect x="30" y="334" width="75" height="8" rx="2" fill="#71717A" opacity="0.5"/>
    <rect x="180" y="334" width="40" height="8" rx="2" fill="#22C55E" opacity="0.3"/>
  </g>

  <!-- Drift arrows connecting schemas -->
  <line x1="500" y1="244" x2="700" y2="254" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="500" y1="188" x2="700" y2="198" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,6" opacity="0.2"/>
  <line x1="500" y1="332" x2="700" y2="322" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="500" y1="288" x2="700" y2="288" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,6" opacity="0.2"/>

  <!-- Drift indicator -->
  <g transform="translate(560, 280)">
    <rect width="80" height="30" rx="6" fill="#111113" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
    <text x="40" y="20" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="11" opacity="0.8">DRIFT</text>
  </g>

  <!-- Warning chevrons -->
  <polygon points="575,350 590,365 575,380" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <polygon points="590,350 605,365 590,380" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>
  <polygon points="605,350 620,365 605,380" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.15"/>
</svg>