<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="blur1b">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <pattern id="dots1" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots1)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>

  <!-- Outer loop ring -->
  <circle cx="600" cy="315" r="200" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>
  <circle cx="600" cy="315" r="160" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="315" r="120" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.15"/>

  <!-- Spiral path suggesting infinite loop -->
  <path d="M600,115 A200,200 0 1,1 400,315 A160,160 0 1,0 600,155 A120,120 0 1,1 480,315 A80,80 0 1,0 600,235" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.6" stroke-linecap="round"/>

  <!-- Animated arrow heads on the spiral (static positions) -->
  <polygon points="598,115 606,115 602,105" fill="#6366F1" opacity="0.8"/>
  <polygon points="478,313 478,321 468,317" fill="#6366F1" opacity="0.6"/>
  <polygon points="598,235 606,235 602,225" fill="#6366F1" opacity="0.5"/>

  <!-- Glowing break point — red stop indicator -->
  <circle cx="750" cy="180" r="18" fill="#EF4444" opacity="0.15" filter="url(#blur1b)"/>
  <circle cx="750" cy="180" r="8" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.8"/>
  <line x1="745" y1="175" x2="755" y2="185" stroke="#EF4444" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <line x1="755" y1="175" x2="745" y2="185" stroke="#EF4444" stroke-width="2" opacity="0.8" stroke-linecap="round"/>

  <!-- Orbiting dots suggesting repeated calls -->
  <circle cx="800" cy="315" r="4" fill="#6366F1" opacity="0.8"/>
  <circle cx="600" cy="515" r="4" fill="#6366F1" opacity="0.6"/>
  <circle cx="400" cy="315" r="4" fill="#6366F1" opacity="0.4"/>
  <circle cx="600" cy="115" r="4" fill="#6366F1" opacity="0.8"/>

  <!-- Secondary decorative loops (top-left) -->
  <circle cx="180" cy="130" r="40" fill="none" stroke="#27272A" stroke-width="1" opacity="0.6"/>
  <circle cx="180" cy="130" r="25" fill="none" stroke="#27272A" stroke-width="0.5" opacity="0.4"/>
  <polygon points="218,128 218,136 226,132" fill="#27272A" opacity="0.5"/>

  <!-- Secondary decorative loops (bottom-right) -->
  <circle cx="1020" cy="490" r="50" fill="none" stroke="#27272A" stroke-width="1" opacity="0.5"/>
  <circle cx="1020" cy="490" r="30" fill="none" stroke="#27272A" stroke-width="0.5" opacity="0.3"/>
  <polygon points="1068,488 1068,496 1076,492" fill="#27272A" opacity="0.4"/>

  <!-- Counter indicator (repetition count) -->
  <rect x="520" y="290" width="160" height="50" rx="8" fill="#111113" stroke="#27272A" stroke-width="1" opacity="0.9"/>
  <text x="600" y="322" text-anchor="middle" fill="#EF4444" font-family="monospace" font-size="18" opacity="0.9">x47 calls</text>

  <!-- Dashed connecting lines from center outward -->
  <line x1="600" y1="115" x2="600" y2="60" stroke="#27272A" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="800" y1="315" x2="860" y2="315" stroke="#27272A" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="600" y1="515" x2="600" y2="570" stroke="#27272A" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="400" y1="315" x2="340" y2="315" stroke="#27272A" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
</svg>