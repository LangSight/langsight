<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur10">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <pattern id="dots10" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots10)"/>
  <rect width="1200" height="630" fill="url(#glow10)"/>

  <!-- Boundary/perimeter box — your infrastructure -->
  <rect x="300" y="100" width="600" height="430" rx="16" fill="none" stroke="#0D9488" stroke-width="2" stroke-dasharray="12,4" opacity="0.35"/>
  <rect x="320" y="120" width="560" height="390" rx="12" fill="#0D9488" opacity="0.02"/>

  <!-- Server rack visualization inside boundary -->
  <!-- Server 1 -->
  <g transform="translate(400, 180)">
    <rect width="200" height="50" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="25" cy="25" r="3" fill="#0D9488" opacity="0.6"/>
    <circle cx="38" cy="25" r="3" fill="#0D9488" opacity="0.6"/>
    <rect x="55" y="18" width="80" height="6" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="55" y="28" width="60" height="4" rx="1" fill="#27272A" opacity="0.3"/>
    <!-- Activity bars -->
    <rect x="150" y="14" width="3" height="22" rx="1" fill="#0D9488" opacity="0.4"/>
    <rect x="157" y="18" width="3" height="18" rx="1" fill="#0D9488" opacity="0.3"/>
    <rect x="164" y="12" width="3" height="24" rx="1" fill="#0D9488" opacity="0.5"/>
    <rect x="171" y="20" width="3" height="16" rx="1" fill="#0D9488" opacity="0.3"/>
    <rect x="178" y="16" width="3" height="20" rx="1" fill="#0D9488" opacity="0.35"/>
  </g>

  <!-- Server 2 -->
  <g transform="translate(400, 245)">
    <rect width="200" height="50" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="25" cy="25" r="3" fill="#0D9488" opacity="0.6"/>
    <circle cx="38" cy="25" r="3" fill="#0D9488" opacity="0.6"/>
    <rect x="55" y="18" width="70" height="6" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="55" y="28" width="55" height="4" rx="1" fill="#27272A" opacity="0.3"/>
    <rect x="150" y="16" width="3" height="18" rx="1" fill="#0D9488" opacity="0.35"/>
    <rect x="157" y="14" width="3" height="22" rx="1" fill="#0D9488" opacity="0.4"/>
    <rect x="164" y="18" width="3" height="14" rx="1" fill="#0D9488" opacity="0.3"/>
    <rect x="171" y="12" width="3" height="26" rx="1" fill="#0D9488" opacity="0.5"/>
    <rect x="178" y="16" width="3" height="18" rx="1" fill="#0D9488" opacity="0.3"/>
  </g>

  <!-- Server 3 -->
  <g transform="translate(400, 310)">
    <rect width="200" height="50" rx="6" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <circle cx="25" cy="25" r="3" fill="#0D9488" opacity="0.6"/>
    <circle cx="38" cy="25" r="3" fill="#0D9488" opacity="0.6"/>
    <rect x="55" y="18" width="90" height="6" rx="2" fill="#27272A" opacity="0.5"/>
    <rect x="55" y="28" width="65" height="4" rx="1" fill="#27272A" opacity="0.3"/>
    <rect x="150" y="14" width="3" height="22" rx="1" fill="#0D9488" opacity="0.45"/>
    <rect x="157" y="18" width="3" height="14" rx="1" fill="#0D9488" opacity="0.3"/>
    <rect x="164" y="10" width="3" height="30" rx="1" fill="#0D9488" opacity="0.5"/>
    <rect x="171" y="16" width="3" height="18" rx="1" fill="#0D9488" opacity="0.35"/>
    <rect x="178" y="20" width="3" height="10" rx="1" fill="#0D9488" opacity="0.25"/>
  </g>

  <!-- Lock symbol (center-right of boundary) -->
  <g transform="translate(660, 200)">
    <rect x="0" y="20" width="40" height="34" rx="5" fill="none" stroke="#0D9488" stroke-width="2" opacity="0.5"/>
    <path d="M8,20 L8,12 A12,12 0 0,1 32,12 L32,20" fill="none" stroke="#0D9488" stroke-width="2" opacity="0.5"/>
    <circle cx="20" cy="37" r="4" fill="#0D9488" opacity="0.4"/>
    <line x1="20" y1="41" x2="20" y2="48" stroke="#0D9488" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Database icon -->
  <g transform="translate(655, 310)">
    <ellipse cx="25" cy="10" rx="25" ry="10" fill="none" stroke="#0D9488" stroke-width="1.5" opacity="0.4"/>
    <path d="M0,10 L0,40 A25,10 0 0,0 50,40 L50,10" fill="none" stroke="#0D9488" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="25" cy="40" rx="25" ry="10" fill="none" stroke="#0D9488" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Data flow arrows (staying INSIDE boundary) -->
  <path d="M600,205 Q625,205 655,220" fill="none" stroke="#0D9488" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <path d="M600,270 Q625,280 655,310" fill="none" stroke="#0D9488" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <path d="M600,335 Q640,350 655,340" fill="none" stroke="#0D9488" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- External cloud (outside boundary, faded/blocked) -->
  <g transform="translate(100, 200)" opacity="0.2">
    <path d="M60,80 A30,30 0 0,1 30,50 A25,25 0 0,1 60,30 A35,35 0 0,1 110,25 A30,30 0 0,1 140,50 A25,25 0 0,1 120,80 Z" fill="none" stroke="#71717A" stroke-width="1.5"/>
    <!-- X over cloud -->
    <line x1="45" y1="35" x2="125" y2="75" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
    <line x1="125" y1="35" x2="45" y2="75" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Blocked arrow from inside to outside -->
  <line x1="300" y1="280" x2="220" y2="260" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <g transform="translate(258, 268)" opacity="0.4">
    <circle cx="0" cy="0" r="8" fill="#EF4444" opacity="0.15"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#EF4444" stroke-width="1.5"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#EF4444" stroke-width="1.5"/>
  </g>

  <!-- External cloud 2 (top-right, also blocked) -->
  <g transform="translate(980, 130)" opacity="0.15">
    <path d="M40,60 A20,20 0 0,1 20,40 A18,18 0 0,1 40,25 A25,25 0 0,1 80,20 A20,20 0 0,1 100,40 A18,18 0 0,1 85,60 Z" fill="none" stroke="#71717A" stroke-width="1.5"/>
    <line x1="30" y1="28" x2="90" y2="55" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
    <line x1="90" y1="28" x2="30" y2="55" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- "Your Infrastructure" label area -->
  <rect x="490" y="478" width="160" height="28" rx="6" fill="#111113" stroke="#0D9488" stroke-width="1" opacity="0.5"/>
</svg>