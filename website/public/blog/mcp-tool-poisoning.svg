<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BE123C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streamClean" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="streamPoison" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BE123C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#BE123C" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="blur5">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
    <pattern id="dots5" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots5)"/>
  <rect width="1200" height="630" fill="url(#glow5)"/>

  <!-- Clean data stream (left side) -->
  <g opacity="0.6">
    <line x1="100" y1="260" x2="450" y2="260" stroke="#22C55E" stroke-width="2" stroke-dasharray="8,4"/>
    <line x1="100" y1="290" x2="450" y2="290" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="6,6"/>
    <line x1="100" y1="320" x2="450" y2="320" stroke="#22C55E" stroke-width="2" stroke-dasharray="8,4"/>
    <line x1="100" y1="350" x2="450" y2="350" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="100" y1="380" x2="450" y2="380" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="6,6"/>
  </g>

  <!-- Clean data stream label -->
  <rect x="120" y="200" width="100" height="24" rx="4" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="138" cy="212" r="3" fill="#22C55E" opacity="0.6"/>

  <!-- Injection point (center) — the corruption zone -->
  <circle cx="560" cy="315" r="80" fill="#BE123C" opacity="0.04" filter="url(#blur5)"/>
  <circle cx="560" cy="315" r="60" fill="none" stroke="#BE123C" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Syringe / injection symbol -->
  <g transform="translate(530, 280)" opacity="0.7">
    <rect x="10" y="0" width="20" height="50" rx="3" fill="none" stroke="#BE123C" stroke-width="1.5"/>
    <line x1="20" y1="50" x2="20" y2="70" stroke="#BE123C" stroke-width="2"/>
    <line x1="15" y1="70" x2="25" y2="70" stroke="#BE123C" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="15" x2="30" y2="15" stroke="#BE123C" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="25" x2="30" y2="25" stroke="#BE123C" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="35" x2="30" y2="35" stroke="#BE123C" stroke-width="1" opacity="0.5"/>
    <!-- Plunger -->
    <rect x="14" y="-12" width="12" height="14" rx="1" fill="none" stroke="#BE123C" stroke-width="1.5"/>
  </g>

  <!-- Corrupted data streams (right side) — wavy, distorted -->
  <g opacity="0.6">
    <path d="M670,260 Q700,240 730,265 Q760,290 790,255 Q820,220 850,270 Q880,310 910,250 Q940,200 970,260 L1100,260" fill="none" stroke="#BE123C" stroke-width="2"/>
    <path d="M670,290 Q700,310 730,280 Q760,250 790,300 Q820,340 850,285 Q880,240 910,295 L1100,295" fill="none" stroke="#BE123C" stroke-width="1.5"/>
    <path d="M670,320 Q700,350 730,310 Q760,280 790,330 Q820,370 850,315 Q880,270 910,325 L1100,325" fill="none" stroke="#BE123C" stroke-width="2"/>
    <path d="M670,350 Q700,330 730,360 Q760,380 790,345 Q820,310 850,355 L1100,355" fill="none" stroke="#BE123C" stroke-width="1"/>
    <path d="M670,380 Q700,400 730,370 Q760,340 790,390 Q820,420 850,375 L1100,375" fill="none" stroke="#BE123C" stroke-width="1.5"/>
  </g>

  <!-- Corrupted label -->
  <rect x="950" y="200" width="120" height="24" rx="4" fill="#BE123C" opacity="0.1" stroke="#BE123C" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="968" cy="212" r="3" fill="#BE123C" opacity="0.6"/>

  <!-- Scattered corruption particles -->
  <circle cx="700" cy="200" r="2" fill="#BE123C" opacity="0.4"/>
  <circle cx="750" cy="420" r="2.5" fill="#BE123C" opacity="0.3"/>
  <circle cx="820" cy="180" r="1.5" fill="#BE123C" opacity="0.5"/>
  <circle cx="900" cy="440" r="2" fill="#BE123C" opacity="0.35"/>
  <circle cx="680" cy="430" r="1.5" fill="#BE123C" opacity="0.3"/>
  <circle cx="850" cy="150" r="2" fill="#BE123C" opacity="0.25"/>
  <circle cx="780" cy="460" r="2.5" fill="#BE123C" opacity="0.3"/>

  <!-- Warning markers on injection boundary -->
  <g transform="translate(490, 245)" opacity="0.5">
    <polygon points="0,14 7,-2 14,14" fill="none" stroke="#BE123C" stroke-width="1.2"/>
  </g>
  <g transform="translate(610, 375)" opacity="0.4">
    <polygon points="0,12 6,-2 12,12" fill="none" stroke="#BE123C" stroke-width="1.2"/>
  </g>

  <!-- Cross-hatching in corruption zone -->
  <g opacity="0.08">
    <line x1="500" y1="255" x2="620" y2="375" stroke="#BE123C" stroke-width="1"/>
    <line x1="520" y1="255" x2="640" y2="375" stroke="#BE123C" stroke-width="1"/>
    <line x1="540" y1="255" x2="620" y2="335" stroke="#BE123C" stroke-width="1"/>
    <line x1="500" y1="295" x2="580" y2="375" stroke="#BE123C" stroke-width="1"/>
  </g>
</svg>