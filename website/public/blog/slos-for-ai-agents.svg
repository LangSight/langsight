<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow12" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="70%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="blur12">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <pattern id="dots12" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#27272A" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#dots12)"/>
  <rect width="1200" height="630" fill="url(#glow12)"/>

  <!-- Large gauge/meter (left side) -->
  <g transform="translate(350, 340)">
    <!-- Gauge arc background -->
    <path d="M-180,0 A180,180 0 0,1 180,0" fill="none" stroke="#27272A" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
    <!-- Gauge arc filled portion (about 85% = ~153 degrees of 180) -->
    <path d="M-180,0 A180,180 0 0,1 155,-90" fill="none" stroke="url(#gaugeGrad)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
    <!-- Gauge tick marks -->
    <line x1="-180" y1="-8" x2="-180" y2="8" stroke="#71717A" stroke-width="1" opacity="0.4" transform="rotate(0)"/>
    <line x1="-158" y1="-88" x2="-162" y2="-80" stroke="#71717A" stroke-width="1" opacity="0.4"/>
    <line x1="-90" y1="-156" x2="-86" y2="-148" stroke="#71717A" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-180" x2="0" y2="-172" stroke="#71717A" stroke-width="1" opacity="0.4"/>
    <line x1="90" y1="-156" x2="86" y2="-148" stroke="#71717A" stroke-width="1" opacity="0.4"/>
    <line x1="158" y1="-88" x2="154" y2="-80" stroke="#71717A" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="-8" x2="180" y2="8" stroke="#71717A" stroke-width="1" opacity="0.4"/>

    <!-- Needle -->
    <line x1="0" y1="0" x2="130" y2="-110" stroke="#6366F1" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#111113" stroke="#6366F1" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#6366F1" opacity="0.6"/>
  </g>

  <!-- Target/bullseye (top-right) -->
  <g transform="translate(850, 200)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#27272A" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#22C55E" opacity="0.5"/>
    <!-- Target crosshair -->
    <line x1="-90" y1="0" x2="-25" y2="0" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
    <line x1="25" y1="0" x2="90" y2="0" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-90" x2="0" y2="-25" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="25" x2="0" y2="90" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Progress bars / threshold visualization (bottom-right) -->
  <g transform="translate(730, 370)">
    <rect width="350" height="170" rx="10" fill="#111113" stroke="#27272A" stroke-width="1"/>

    <!-- SLO 1: Latency -->
    <rect x="20" y="20" width="120" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="20" y="35" width="310" height="10" rx="3" fill="#27272A" opacity="0.2"/>
    <rect x="20" y="35" width="280" height="10" rx="3" fill="#22C55E" opacity="0.3"/>
    <!-- Threshold line -->
    <line x1="290" y1="30" x2="290" y2="50" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

    <!-- SLO 2: Success Rate -->
    <rect x="20" y="65" width="100" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="20" y="80" width="310" height="10" rx="3" fill="#27272A" opacity="0.2"/>
    <rect x="20" y="80" width="296" height="10" rx="3" fill="#22C55E" opacity="0.35"/>
    <line x1="290" y1="75" x2="290" y2="95" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

    <!-- SLO 3: Error Budget (lower, warning zone) -->
    <rect x="20" y="110" width="90" height="6" rx="2" fill="#27272A" opacity="0.4"/>
    <rect x="20" y="125" width="310" height="10" rx="3" fill="#27272A" opacity="0.2"/>
    <rect x="20" y="125" width="210" height="10" rx="3" fill="#F59E0B" opacity="0.3"/>
    <line x1="290" y1="120" x2="290" y2="140" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- Percentage display -->
  <g transform="translate(280, 370)">
    <rect width="140" height="50" rx="8" fill="#111113" stroke="#27272A" stroke-width="1"/>
    <text x="70" y="34" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="22" opacity="0.7">99.2%</text>
  </g>

  <!-- Decorative metric dots -->
  <circle cx="200" cy="140" r="3" fill="#22C55E" opacity="0.3"/>
  <circle cx="250" cy="120" r="2" fill="#6366F1" opacity="0.3"/>
  <circle cx="180" cy="180" r="2" fill="#F59E0B" opacity="0.25"/>

  <!-- Time axis hint at bottom -->
  <line x1="200" y1="560" x2="1000" y2="560" stroke="#27272A" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="555" x2="200" y2="565" stroke="#27272A" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="555" x2="400" y2="565" stroke="#27272A" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="555" x2="600" y2="565" stroke="#27272A" stroke-width="1" opacity="0.2"/>
  <line x1="800" y1="555" x2="800" y2="565" stroke="#27272A" stroke-width="1" opacity="0.2"/>
  <line x1="1000" y1="555" x2="1000" y2="565" stroke="#27272A" stroke-width="1" opacity="0.2"/>
</svg>