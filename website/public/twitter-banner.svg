<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Twitter/X header banner (1500x500) -->
  <rect width="1500" height="500" fill="#09090B"/>

  <!-- Grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0V60H0" stroke="#1C1C1F" stroke-width="0.5" fill="none"/>
  </pattern>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Glow -->
  <circle cx="750" cy="250" r="350" fill="#14B8A6" opacity="0.05"/>

  <!-- Logo icon centered -->
  <rect x="580" y="120" width="72" height="72" rx="16" fill="#14B8A6"/>
  <circle cx="616" cy="156" r="13.5" stroke="white" stroke-width="3.5" fill="none"/>
  <circle cx="616" cy="156" r="4" fill="white"/>
  <line x1="626" y1="146" x2="639" y2="133" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <text x="668" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="42" letter-spacing="-1">
    <tspan fill="white">Lang</tspan><tspan fill="#2DD4BF">Sight</tspan>
  </text>

  <!-- Tagline -->
  <text x="750" y="280" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="28" fill="#A1A1AA" text-anchor="middle">Your agent failed. Which tool broke — and why?</text>

  <!-- Pillars -->
  <text x="750" y="340" font-family="monospace" font-size="18" fill="#3F3F46" text-anchor="middle">Action Traces  ·  MCP Health  ·  Security Scanning  ·  Cost Attribution</text>

  <!-- URL -->
  <text x="750" y="420" font-family="monospace" font-size="20" fill="#14B8A6" text-anchor="middle">langsight.dev</text>
</svg>
