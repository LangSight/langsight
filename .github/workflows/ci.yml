name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint + type check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/

      - name: Mypy type check
        run: uv run mypy src/ --no-error-summary

  # ---------------------------------------------------------------------------
  # Unit + regression tests (no Docker needed)
  # ---------------------------------------------------------------------------
  test:
    name: Unit & Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit + regression tests
        run: uv run pytest --no-header

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Integration tests (requires Docker + postgres-mcp)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Set up postgres-mcp dependencies
        run: |
          cd test-mcps/postgres-mcp
          uv sync

      - name: Start PostgreSQL via Docker Compose
        run: |
          cd test-mcps
          docker compose up -d
          for i in {1..20}; do
            docker exec langsight-postgres pg_isready -U postgres -d langsight_test && break
            echo "Waiting for postgres... ($i)"
            sleep 2
          done

      - name: Run integration tests (postgres-mcp health checker + storage)
        env:
          # test-mcps/docker-compose.yml uses postgres/postgres/langsight_test
          TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/langsight_test
        run: |
          # Exclude ClickHouse tests — those run in the dedicated ClickHouse job
          uv run pytest -m integration \
            --ignore=tests/integration/storage/test_clickhouse_integration.py \
            --ignore=tests/integration/storage/test_costs_integration.py \
            --no-cov -v

      - name: Stop Docker Compose
        if: always()
        run: cd test-mcps && docker compose down -v

  # ---------------------------------------------------------------------------
  # ClickHouse integration tests
  # ---------------------------------------------------------------------------
  integration-clickhouse:
    name: ClickHouse Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Start ClickHouse
        run: |
          # Start ClickHouse directly — avoids docker-compose required-var issues.
          # No auth (default user, empty password) matches how the integration tests connect.
          docker run -d \
            --name langsight-ci-clickhouse \
            -p 8123:8123 -p 9000:9000 \
            -e CLICKHOUSE_DB=langsight_test \
            clickhouse/clickhouse-server:24
          for i in {1..30}; do
            curl -s http://localhost:8123/ping | grep -q Ok && echo "ClickHouse ready after ${i}s" && break
            echo "Waiting for ClickHouse... ($i)"
            sleep 2
          done

      - name: Run ClickHouse integration tests
        env:
          TEST_CLICKHOUSE_HOST: localhost
          TEST_CLICKHOUSE_PORT: "8123"
        run: uv run pytest tests/integration/storage/test_clickhouse_integration.py -m integration --no-cov -v

      - name: Stop ClickHouse
        if: always()
        run: docker stop langsight-ci-clickhouse && docker rm langsight-ci-clickhouse
