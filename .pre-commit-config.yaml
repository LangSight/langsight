repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--no-error-summary]
        additional_dependencies: [pydantic, pydantic-settings, structlog, fastapi, asyncpg-stubs, httpx, click]
        pass_filenames: false
        entry: mypy src/
