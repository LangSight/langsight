services:

  # ---------------------------------------------------------------------------
  # ClickHouse — time-series span storage + tool reliability analytics
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: langsight-clickhouse
    environment:
      CLICKHOUSE_DB: langsight
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP interface (clickhouse-connect)
      - "9000:9000"   # Native TCP (optional)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL — app state: MCP configs, alert rules, API keys
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: langsight-postgres
    environment:
      POSTGRES_DB: langsight
      POSTGRES_USER: langsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langsight}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langsight -d langsight"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OTEL Collector — receives traces from agent frameworks, forwards to LangSight
  # Configure your framework:
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: langsight-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (collector self-monitoring)
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # LangSight API — FastAPI REST API + span ingestion
  # ---------------------------------------------------------------------------
  api:
    image: langsight/api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langsight-api
    environment:
      LANGSIGHT_STORAGE_MODE: clickhouse
      LANGSIGHT_CLICKHOUSE_URL: http://clickhouse:8123
      LANGSIGHT_CLICKHOUSE_DATABASE: langsight
      LANGSIGHT_POSTGRES_URL: postgresql://langsight:${POSTGRES_PASSWORD:-langsight}@postgres:5432/langsight
      LANGSIGHT_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/status | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local
  postgres_data:
    driver: local
