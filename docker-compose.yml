networks:
  # Dedicated internal network with a fixed /24 subnet.
  # LANGSIGHT_TRUSTED_PROXY_CIDRS defaults to this subnet so only containers
  # on langsight-net can send trusted X-User-* session headers to the API.
  # Operators running in a different network topology should override
  # LANGSIGHT_TRUSTED_PROXY_CIDRS to match their actual proxy container subnet.
  langsight-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: langsight-clickhouse
    environment:
      CLICKHOUSE_DB: langsight
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER env var is required}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD env var is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    # Ports bound to loopback — integration tests connect via localhost
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [langsight-net]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: langsight-app-postgres
    environment:
      POSTGRES_DB: langsight
      POSTGRES_USER: langsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    # Port bound to loopback — integration tests connect via localhost
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langsight -d langsight"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [langsight-net]
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: langsight-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      api:
        condition: service_healthy
    networks: [langsight-net]
    restart: unless-stopped

  api:
    image: langsight/api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langsight-api
    environment:
      LANGSIGHT_STORAGE_MODE: dual
      LANGSIGHT_CLICKHOUSE_URL: http://clickhouse:8123
      LANGSIGHT_CLICKHOUSE_DATABASE: langsight
      LANGSIGHT_CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:?CLICKHOUSE_USER env var is required}
      LANGSIGHT_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD env var is required}
      LANGSIGHT_POSTGRES_URL: postgresql://langsight:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}@postgres:5432/langsight
      LANGSIGHT_LOG_LEVEL: INFO
      # At least one API key is required — generate with: langsight api-key create <name>
      LANGSIGHT_API_KEYS: ${LANGSIGHT_API_KEYS:?LANGSIGHT_API_KEYS env var is required}
      # Restrict CORS to the dashboard origin
      LANGSIGHT_CORS_ORIGINS: ${LANGSIGHT_CORS_ORIGINS:-http://localhost:3003}
      # Dashboard base URL used in invite links — must point to Next.js, not FastAPI
      LANGSIGHT_DASHBOARD_URL: ${LANGSIGHT_DASHBOARD_URL:-http://localhost:3003}
      # Trust X-User-* session headers only from containers on langsight-net
      # (172.20.0.0/24). This replaces the previous broad 172.16.0.0/12 default
      # which covered all Docker bridge subnets and any private 10.x network.
      # Override via LANGSIGHT_TRUSTED_PROXY_CIDRS if deploying outside Compose.
      LANGSIGHT_TRUSTED_PROXY_CIDRS: ${LANGSIGHT_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128,172.20.0.0/24}
      # Bootstrap admin user — created on first startup when no users exist
      LANGSIGHT_ADMIN_EMAIL: ${LANGSIGHT_ADMIN_EMAIL:-}
      LANGSIGHT_ADMIN_PASSWORD: ${LANGSIGHT_ADMIN_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - ./.langsight.yaml:/app/.langsight.yaml:ro
      - ./test-mcps:/app/test-mcps:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/liveness')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [langsight-net]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # Dashboard — Next.js 15 product UI (host port 3003)
  # ─────────────────────────────────────────────────────────────────────────────
  dashboard:
    image: langsight/dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        LANGSIGHT_API_URL: http://api:8000
    container_name: langsight-dashboard
    environment:
      LANGSIGHT_API_URL: http://api:8000
      LANGSIGHT_API_KEY: ${LANGSIGHT_API_KEYS:?LANGSIGHT_API_KEYS env var is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET env var is required (generate with: openssl rand -base64 32)}"
      NEXTAUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET env var is required}
      LANGSIGHT_ADMIN_EMAIL: ${LANGSIGHT_ADMIN_EMAIL:?LANGSIGHT_ADMIN_EMAIL env var is required}
      LANGSIGHT_ADMIN_PASSWORD: ${LANGSIGHT_ADMIN_PASSWORD:?LANGSIGHT_ADMIN_PASSWORD env var is required}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: "0.0.0.0"
    ports:
      - "3003:3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [langsight-net]
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local
  postgres_data:
    driver: local
