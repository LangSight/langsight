services:

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: langsight-clickhouse
    environment:
      CLICKHOUSE_DB: langsight
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Port 5433 on host — avoids conflict with test-mcps postgres on 5432
  postgres:
    image: postgres:16-alpine
    container_name: langsight-app-postgres
    environment:
      POSTGRES_DB: langsight
      POSTGRES_USER: langsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langsight}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langsight -d langsight"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: langsight-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: langsight/api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langsight-api
    environment:
      LANGSIGHT_STORAGE_MODE: clickhouse
      LANGSIGHT_CLICKHOUSE_URL: http://clickhouse:8123
      LANGSIGHT_CLICKHOUSE_DATABASE: langsight
      LANGSIGHT_POSTGRES_URL: postgresql://langsight:${POSTGRES_PASSWORD:-langsight}@postgres:5432/langsight
      LANGSIGHT_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/status | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local
  postgres_data:
    driver: local
