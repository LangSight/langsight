# OTEL Collector config — forwards MCP tool call traces to LangSight
#
# Engineers point their framework's OTEL exporter here:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#
# When OTEL_COLLECTOR_TOKEN is set, include it in your exporter config:
#   OTEL_EXPORTER_OTLP_HEADERS="Authorization=Bearer ${OTEL_COLLECTOR_TOKEN}"
#
# The collector receives spans and forwards them to the LangSight OTLP endpoint.
#
# SECURITY: OTEL_COLLECTOR_TOKEN MUST be set in any shared or production
# deployment. When the token is blank, any client can inject arbitrary spans
# — poisoning analytics, triggering false alerts, and inflating storage costs.
# Local dev only: set OTEL_COLLECTOR_TOKEN="" explicitly if you accept the risk.

extensions:
  bearertokenauth/collector:
    # Validate inbound OTLP requests from SDK clients against this token.
    # Set OTEL_COLLECTOR_TOKEN in the environment (docker-compose passes it
    # from the host).
    #
    # IMPORTANT: When the env var is empty, the token is blank and any
    # request is accepted. This is a security risk in shared deployments.
    # Always set OTEL_COLLECTOR_TOKEN before exposing the collector.
    token: "${env:OTEL_COLLECTOR_TOKEN}"

  # Health check extension — enables /healthz endpoint for readiness probes.
  # Also used by the startup script to verify the collector is running before
  # accepting traffic.
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        auth:
          authenticator: bearertokenauth/collector
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth/collector

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  # Filter to only MCP-related spans to avoid noise
  filter/mcp:
    spans:
      include:
        match_type: regexp
        span_names:
          - "mcp\\..*"
          - "gen_ai\\.tool\\..*"

exporters:
  # Forward to LangSight OTLP endpoint (API key required)
  otlphttp/langsight:
    endpoint: http://api:8000/api/traces/otlp
    tls:
      insecure: true
    headers:
      X-API-Key: "${env:LANGSIGHT_API_KEY}"

service:
  extensions: [bearertokenauth/collector, health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, filter/mcp]
      exporters: [otlphttp/langsight]
